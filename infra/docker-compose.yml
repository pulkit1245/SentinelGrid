version: "3.9"

networks:
  sentinelgrid-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  minio_data:
  redis_data:

services:
  # ── PostgreSQL + TimescaleDB ─────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: sentinelgrid-postgres
    environment:
      POSTGRES_USER: sentinelgrid
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sentinelgrid
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentinelgrid-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelgrid"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sentinelgrid-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sentinelgrid-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j ─────────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: sentinelgrid-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - sentinelgrid-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Qdrant ────────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sentinelgrid-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - sentinelgrid-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (Object Storage) ────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: sentinelgrid-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - sentinelgrid-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: dev
    container_name: sentinelgrid-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinelgrid:password@postgres:5432/sentinelgrid
      DATABASE_SYNC_URL: postgresql://sentinelgrid:password@postgres:5432/sentinelgrid
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      QDRANT_URL: http://qdrant:6333
      JWT_SECRET_KEY: dev-secret-key-change-in-prod
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      SERVICE_TOKEN: dev-service-token
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: sentinelgrid-evidence
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    networks:
      - sentinelgrid-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend (Vite Dev Server) ────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: dev
    container_name: sentinelgrid-frontend
    command: npm run dev -- --host
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
      VITE_MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    networks:
      - sentinelgrid-net
    depends_on:
      - backend
