services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5433:5432"       # 5433 on host to avoid conflict with other containers
    environment:
      POSTGRES_USER: sentinelgrid
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sentinelgrid
    volumes:
      - sentinelgrid_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine   # alpine = ~15MB vs 45MB
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://sentinelgrid:password@postgres:5432/sentinelgrid
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET_KEY=dev-secret-change-in-production
      - SERVICE_TOKEN=dev-service-token
    depends_on:
      - postgres
      - redis
      - neo4j
      - qdrant

  simulator:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: ["uvicorn", "app.simulator.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload"]
    ports:
      - "8002:8002"
    environment:
      - PYTHONPATH=/app/backend
      - BRIDGE_URL=http://backend:8000/api/v1/simulator-bridge/batch
      - SERVICE_TOKEN=dev-service-token
      - SIMULATOR_CONFIG_DIR=/app/simulator/config
    depends_on:
      - backend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  sentinelgrid_pg_data:
